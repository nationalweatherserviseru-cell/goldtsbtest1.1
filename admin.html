<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ панель - Gold TSB</title>
    
    <link rel="icon" type="image/png" href="/Assets/i-_11_.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .admin-panel-section {
            background: #0f0f0f;
            padding: 25px;
            border: 1px solid #2a2a2a;
            margin-bottom: 25px;
        }
        
        .user-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 15px;
            border-bottom: 1px solid #2a2a2a;
            background: #1a1a1a;
            margin-bottom: 8px;
        }
        
        .user-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .user-name {
            font-weight: 700;
            color: #ffffff;
        }
        
        .user-status {
            font-size: 0.85rem;
            color: #b0b0b0;
        }
        
        .user-kills {
            font-size: 0.85rem;
            color: #888;
        }
        
        .ban-info {
            font-size: 0.8rem;
            color: #ff8888;
            margin-top: 4px;
        }
        
        .small {
            padding: 6px 14px;
            font-size: 0.85rem;
            background: #2a2a2a;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid #333333;
            margin-left: 8px;
            color: #e0e0e0;
        }
        
        .small:hover {
            background: #333333;
            border-color: #ff8c00;
        }
        
        .small.green {
            background: #4caf50;
            color: #000000;
            border-color: #3d8c40;
        }
        
        .ip-ban-item {
            background: #1a1a1a;
            padding: 15px;
            margin-bottom: 10px;
            border: 1px solid #333;
        }
        
        .banner-history-item {
            background: #1a1a1a;
            padding: 10px;
            margin-bottom: 5px;
            border: 1px solid #333;
        }
        
        .search-user {
            display: flex;
            gap: 12px;
            margin: 20px 0;
        }
        
        .search-user input {
            flex: 1;
            padding: 12px 18px;
            background: #0f0f0f;
            border: 1.5px solid #333;
            color: white;
        }
        
        .profile-card {
            background: #0f0f0f;
            padding: 25px;
            border: 1px solid #2a2a2a;
            margin-top: 20px;
        }
        
        .related-accounts {
            margin-top: 15px;
            padding: 10px;
            background: #1a1a1a;
            border: 1px solid #333;
        }
        
        .related-account-item {
            padding: 8px;
            margin: 5px 0;
            background: #0f0f0f;
            border-left: 3px solid #ff8c00;
            cursor: pointer;
        }
        
        .related-account-item:hover {
            background: #2a2a2a;
        }
        
        .ban-controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        
        .ban-duration {
            padding: 6px;
            background: #2a2a2a;
            color: white;
            border: 1px solid #333;
            width: 100px;
        }
        
        .ban-reason {
            padding: 6px;
            background: #2a2a2a;
            color: white;
            border: 1px solid #333;
            width: 200px;
        }
        
        .ban-button {
            padding: 6px 12px;
            background: #ff0000;
            color: white;
            border: none;
            cursor: pointer;
        }
        
        @media (max-width: 768px) {
            .ban-controls {
                flex-direction: column;
            }
            
            .ban-duration, .ban-reason {
                width: 100%;
            }
            
            .search-user {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="shield-bg">
        <i class="fas fa-shield-alt"></i>
        <i class="fas fa-shield-alt"></i>
        <i class="fas fa-shield-alt"></i>
        <i class="fas fa-shield-alt"></i>
        <i class="fas fa-shield-alt"></i>
        <i class="fas fa-shield-alt"></i>
    </div>

    <div class="app">
        <nav class="navbar">
            <div class="navbar-left">
                <div class="site-avatar" onclick="location.href='/'">
                    <img src="/Assets/i-_11_.png" alt="Gold TSB">
                </div>
                <div class="logo" onclick="location.href='/'">GOLD TSB</div>
            </div>
            <div class="nav-links">
                <a href="/">НОВОСТИ</a>
                <a href="/forum.html">ФОРУМ</a>
                <a href="/users.html">USERS</a>
                <a href="/rules.html">ПРАВИЛА</a>
                <a href="/admin.html" class="active">ADMIN</a>
            </div>
            <div class="user-area" id="userArea"></div>
        </nav>

        <div class="panel" id="adminPanel"></div>

        <div class="footer">
            <a href="/">НОВОСТИ</a>
            <a href="/forum.html">ФОРУМ</a>
            <a href="/users.html">USERS</a>
            <a href="/rules.html">ПРАВИЛА</a>
        </div>
    </div>

    <div id="authModal" class="modal hidden">
        <div class="modal-content">
            <span class="close-modal" onclick="closeAuthModal()">&times;</span>
            <div id="authForm"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/config.js"></script>
    <script src="/js/main.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/admin.js"></script>
</body>
</html>
