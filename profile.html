<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль - Gold TSB</title>
    
    <link rel="icon" type="image/png" href="/Assets/i-_11_.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .profile-page {
            background: #1a1a1a;
            padding: 30px;
            border: 1px solid #2a2a2a;
        }
        
        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
            flex-wrap: wrap;
        }
        
        .profile-avatar {
            width: 80px;
            height: 80px;
            background: #2a2a2a;
            border: 3px solid #ff8c00;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: #ff8c00;
        }
        
        .profile-info {
            flex: 1;
        }
        
        .profile-info h2 {
            margin-bottom: 5px;
            border-left: none;
            padding-left: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .profile-info .bio {
            color: #b0b0b0;
            font-size: 0.95rem;
            margin: 10px 0;
            font-style: italic;
        }
        
        .profile-info .created-date {
            color: #888;
            font-size: 0.85rem;
            margin-top: 5px;
        }
        
        .verified-status {
            color: #4caf50;
            font-size: 0.9rem;
        }
        
        .unverified-status {
            color: #ff8888;
            font-size: 0.9rem;
        }
        
        .banned-status {
            color: #ff4d4f;
            font-size: 0.9rem;
        }
        
        .profile-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-box {
            background: #0f0f0f;
            padding: 20px;
            border: 1px solid #333;
            text-align: center;
        }
        
        .stat-box .label {
            color: #b0b0b0;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }
        
        .stat-box .value {
            font-size: 2rem;
            font-weight: 700;
            color: #ff8c00;
        }
        
        .profile-actions {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .update-profile-section {
            background: #0f0f0f;
            padding: 20px;
            border: 1px solid #333;
            margin-top: 20px;
        }
        
        .cooldown-info {
            color: #ff8888;
            font-size: 0.9rem;
            margin-top: 10px;
        }
        
        .ban-controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        
        .ban-duration {
            padding: 6px;
            background: #2a2a2a;
            color: white;
            border: 1px solid #333;
            width: 100px;
        }
        
        .ban-reason {
            padding: 6px;
            background: #2a2a2a;
            color: white;
            border: 1px solid #333;
            width: 200px;
        }
        
        .ban-button {
            padding: 6px 12px;
            background: #ff0000;
            color: white;
            border: none;
            cursor: pointer;
        }
        
        .ban-button:hover {
            background: #cc0000;
        }
        
        .admin-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #ff8c00;
            font-size: 1.2rem;
        }
        
        .kill-badge {
            background: #2a2a2a;
            color: #ff8c00;
            padding: 6px 16px;
            display: inline-block;
            font-weight: 600;
            border: 1px solid #333333;
        }
        
        .kill-badge.unverified {
            color: #ff8888;
            border-color: #ff4d4f;
        }
        
        @media (max-width: 768px) {
            .profile-header {
                flex-direction: column;
                text-align: center;
            }
            
            .profile-info h2 {
                justify-content: center;
            }
            
            .ban-controls {
                flex-direction: column;
            }
            
            .ban-duration, .ban-reason {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="shield-bg">
        <i class="fas fa-shield-alt"></i>
        <i class="fas fa-shield-alt"></i>
        <i class="fas fa-shield-alt"></i>
        <i class="fas fa-shield-alt"></i>
        <i class="fas fa-shield-alt"></i>
        <i class="fas fa-shield-alt"></i>
    </div>

    <div class="app">
        <nav class="navbar">
            <div class="navbar-left">
                <div class="site-avatar" onclick="location.href='/'">
                    <img src="/Assets/i-_11_.png" alt="Gold TSB">
                </div>
                <div class="logo" onclick="location.href='/'">GOLD TSB</div>
            </div>
            <div class="nav-links">
                <a href="/">НОВОСТИ</a>
                <a href="/forum.html">ФОРУМ</a>
                <a href="/users.html">USERS</a>
                <a href="/rules.html">ПРАВИЛА</a>
                <a href="/admin.html" id="adminTabLink" style="display: none;">ADMIN</a>
            </div>
            <div class="user-area" id="userArea"></div>
        </nav>

        <div id="profileContent"></div>

        <div class="footer">
            <a href="/">НОВОСТИ</a>
            <a href="/forum.html">ФОРУМ</a>
            <a href="/users.html">USERS</a>
            <a href="/rules.html">ПРАВИЛА</a>
        </div>
    </div>

    <div id="authModal" class="modal hidden">
        <div class="modal-content">
            <span class="close-modal" onclick="closeAuthModal()">&times;</span>
            <div id="authForm"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/config.js"></script>
    <script src="/js/main.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/profile.js"></script>
</body>
</html>
