<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пользователи - Gold TSB</title>
    
    <link rel="icon" type="image/png" href="/Assets/i-_11_.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .search-user {
            display: flex;
            gap: 12px;
            max-width: 500px;
            margin: 25px 0;
        }
        
        .search-user input {
            flex: 1;
            padding: 12px 18px;
            border-radius: 0;
            border: 1.5px solid #333333;
            font-size: 0.95rem;
            background: #0f0f0f;
            color: #ffffff;
        }
        
        .search-user input:focus {
            outline: none;
            border-color: #ff8c00;
        }
        
        .search-user button {
            background: #ff8c00;
            border: none;
            color: #000000;
            padding: 0 28px;
            border-radius: 0;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
        }
        
        .profile-card {
            background: #0f0f0f;
            border-radius: 0;
            padding: 25px;
            border: 1px solid #2a2a2a;
            margin-top: 25px;
        }
        
        .profile-card h3 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #ffffff;
        }
        
        .kill-badge {
            background: #2a2a2a;
            color: #ff8c00;
            padding: 6px 16px;
            display: inline-block;
            font-weight: 600;
            margin: 8px 0;
            border: 1px solid #333333;
        }
        
        .kill-badge.unverified {
            color: #ff8888;
            border-color: #ff4d4f;
        }
        
        .verified-badge {
            background: #4caf50;
            color: #000000;
            padding: 4px 12px;
            font-size: 0.8rem;
            font-weight: 700;
            margin-left: 10px;
        }
        
        .banned-badge {
            background: #ff0000;
            color: #ffffff;
            padding: 6px 16px;
            font-weight: 700;
            display: inline-block;
        }
        
        .unverified-text {
            color: #ff8888;
            font-size: 0.85rem;
            margin-left: 10px;
            font-style: italic;
        }
        
        @media (max-width: 768px) {
            .search-user {
                flex-direction: column;
            }
            
            .search-user button {
                width: 100%;
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="shield-bg">
        <i class="fas fa-shield-alt"></i>
        <i class="fas fa-shield-alt"></i>
        <i class="fas fa-shield-alt"></i>
        <i class="fas fa-shield-alt"></i>
        <i class="fas fa-shield-alt"></i>
        <i class="fas fa-shield-alt"></i>
    </div>

    <div class="app">
        <nav class="navbar">
            <div class="navbar-left">
                <div class="site-avatar" onclick="location.href='/'">
                    <img src="/Assets/i-_11_.png" alt="Gold TSB">
                </div>
                <div class="logo" onclick="location.href='/'">GOLD TSB</div>
            </div>
            <div class="nav-links">
                <a href="/">НОВОСТИ</a>
                <a href="/forum.html">ФОРУМ</a>
                <a href="/users.html" class="active">USERS</a>
                <a href="/rules.html">ПРАВИЛА</a>
                <a href="/admin.html" id="adminTabLink" style="display: none;">ADMIN</a>
            </div>
            <div class="user-area" id="userArea"></div>
        </nav>

        <div class="panel">
            <h2><i class="fas fa-users"></i> ПОИСК ПОЛЬЗОВАТЕЛЯ</h2>
            <div class="search-user">
                <input type="text" id="searchUsername" placeholder="Введите ник аккаунта">
                <button id="searchUserBtn"><i class="fas fa-search" style="margin-right: 8px;"></i>Найти</button>
            </div>
            <div id="searchResult"></div>
        </div>

        <div class="footer">
            <a href="/">НОВОСТИ</a>
            <a href="/forum.html">ФОРУМ</a>
            <a href="/users.html">USERS</a>
            <a href="/rules.html">ПРАВИЛА</a>
        </div>
    </div>

    <div id="authModal" class="modal hidden">
        <div class="modal-content">
            <span class="close-modal" onclick="closeAuthModal()">&times;</span>
            <div id="authForm"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/config.js"></script>
    <script src="/js/main.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/users.js"></script>
</body>
</html>
