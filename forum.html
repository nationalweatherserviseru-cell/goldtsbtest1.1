<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Форум - Gold TSB</title>
    
    <link rel="icon" type="image/png" href="/Assets/i-_11_.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .forum-container {
            background: #1a1a1a;
            padding: 30px;
            border: 1px solid #2a2a2a;
        }
        
        .forum-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .forum-stats {
            color: #b0b0b0;
            font-size: 0.95rem;
        }
        
        .forum-stats span {
            color: #ff8c00;
            font-weight: 700;
        }
        
        .forum-create-btn {
            background: #ff8c00;
            color: #000000;
            border: none;
            padding: 12px 30px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .forum-create-btn:hover {
            background: #e67e00;
        }
        
        .forum-create-btn:disabled {
            background: #666;
            cursor: not-allowed;
        }
        
        .forum-posts {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .forum-post {
            background: #0f0f0f;
            border: 1px solid #333;
            padding: 25px;
            position: relative;
        }
        
        .forum-post.admin-post {
            border-left: 4px solid #ff8c00;
        }
        
        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        
        .post-author {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .author-avatar {
            width: 50px;
            height: 50px;
            background: #2a2a2a;
            border: 2px solid #ff8c00;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #ff8c00;
            cursor: pointer;
        }
        
        .author-info h4 {
            color: #ffffff;
            margin-bottom: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .author-info h4:hover {
            color: #ff8c00;
        }
        
        .author-info .post-date {
            color: #888;
            font-size: 0.85rem;
        }
        
        .post-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: #ff8c00;
        }
        
        .post-content {
            color: #e0e0e0;
            line-height: 1.6;
            margin-bottom: 20px;
            white-space: pre-wrap;
        }
        
        .post-links {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #333;
        }
        
        .post-links a {
            display: inline-block;
            margin-right: 15px;
            color: #ff8c00;
            text-decoration: none;
        }
        
        .post-actions {
            position: absolute;
            top: 25px;
            right: 25px;
            display: flex;
            gap: 10px;
        }
        
        .delete-post {
            background: #ff3333;
            color: white;
            border: none;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
        }
        
        .comments-section {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 2px solid #333;
        }
        
        .comments-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #ff8c00;
            margin-bottom: 15px;
        }
        
        .comment {
            background: #1a1a1a;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 3px solid #ff8c00;
        }
        
        .comment-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        
        .comment-author {
            font-weight: 600;
            color: #ff8c00;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .comment-date {
            color: #888;
            font-size: 0.8rem;
        }
        
        .comment-content {
            color: #e0e0e0;
            line-height: 1.5;
            white-space: pre-wrap;
        }
        
        .comment-actions {
            margin-top: 8px;
        }
        
        .comment-delete {
            background: #ff3333;
            color: white;
            border: none;
            padding: 4px 10px;
            font-size: 0.75rem;
            cursor: pointer;
        }
        
        .add-comment {
            margin-top: 20px;
        }
        
        .add-comment textarea {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            min-height: 80px;
            margin-bottom: 10px;
            resize: vertical;
        }
        
        .add-comment button {
            background: #ff8c00;
            color: #000000;
            border: none;
            padding: 8px 20px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .forum-create-panel {
            background: #0f0f0f;
            border: 1px solid #333;
            padding: 25px;
            margin-bottom: 30px;
        }
        
        .forum-create-panel input,
        .forum-create-panel textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
        }
        
        .cooldown-timer {
            color: #ff8888;
            margin-left: 10px;
            font-size: 0.9rem;
        }
        
        .empty-forum {
            text-align: center;
            padding: 50px;
            color: #888;
            border: 2px dashed #333;
        }
        
        .admin-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #ff8c00;
            font-size: 1.2rem;
            cursor: help;
        }
        
        @media (max-width: 768px) {
            .post-header {
                flex-direction: column;
                gap: 10px;
            }
            
            .post-actions {
                position: static;
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="shield-bg">
        <i class="fas fa-shield-alt"></i>
        <i class="fas fa-shield-alt"></i>
        <i class="fas fa-shield-alt"></i>
        <i class="fas fa-shield-alt"></i>
        <i class="fas fa-shield-alt"></i>
        <i class="fas fa-shield-alt"></i>
    </div>

    <div id="globalBanner" class="global-banner hidden">
        <span id="bannerMessage"></span>
        <button id="closeBannerBtn" onclick="closeGlobalBanner()" class="hidden">✕</button>
    </div>

    <div class="app">
        <nav class="navbar">
            <div class="navbar-left">
                <div class="site-avatar" onclick="location.href='/'">
                    <img src="/Assets/i-_11_.png" alt="Gold TSB">
                </div>
                <div class="logo" onclick="location.href='/'">GOLD TSB</div>
            </div>
            <div class="nav-links">
                <a href="/">НОВОСТИ</a>
                <a href="/forum.html" class="active">ФОРУМ</a>
                <a href="/users.html">USERS</a>
                <a href="/rules.html">ПРАВИЛА</a>
                <a href="/admin.html" id="adminTabLink" style="display: none;">ADMIN</a>
            </div>
            <div class="user-area" id="userArea"></div>
        </nav>

        <div id="forumContent"></div>

        <div class="footer">
            <a href="/">НОВОСТИ</a>
            <a href="/forum.html">ФОРУМ</a>
            <a href="/users.html">USERS</a>
            <a href="/rules.html">ПРАВИЛА</a>
        </div>
    </div>

    <div id="authModal" class="modal hidden">
        <div class="modal-content">
            <span class="close-modal" onclick="closeAuthModal()">&times;</span>
            <div id="authForm"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/config.js"></script>
    <script src="/js/main.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/forum.js"></script>
</body>
</html>
